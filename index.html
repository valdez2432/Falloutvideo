<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Intro</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            background: black;
        }
    </style>
</head>
<body>
    <video id="intro" autoplay muted playsinline>
        <source src="falloutintrotest.mp4" type="video/mp4">
    </video>

    <script>
        const vid = document.getElementById("intro");

        vid.addEventListener("ended", function() {
            console.log("INTRO_VIDEO_ENDED");
        });

        vid.addEventListener("error", function() {
            console.log("INTRO_VIDEO_ERROR");
        });

        vid.play().catch(function() {
            console.log("INTRO_VIDEO_PLAY_FAILED");
        });
    </script>
</body>
</html>
